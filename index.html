      <div class="main-wrapper" style="display: none;">
        <h1>Snake Game</h1>
        <p>プレイ方法</p>
        <p>緑色のセルが操作するヘビで、赤色の果実を食べていき蛇を成長させてください。</p>
        <p>ヘビが自分の体を食べてしまったらゲームオーバーです。</p>
        <p>操作方法</p>
        <p>Wキー：上、Sキー：下、Dキー：右、Aキー：左</p>
        <p></p>
        <p>再プレイするにはサイトを再読み込みをしてください。</p>
        <div class="game-wrapper">
          <div id="menu_area" class="snake_game_menu">
            <div id="welcome" class="welcome">
              <p>welcome to Snake Game</p>
              <button>start</button>
            </div>
            <div id = "again" class="play_again">
              <p>you died</p>
              <p>play again. Road please.</p>
              <button id="restart">Restart</button>
            </div>
          </div>
          <p class="snake_game_score">Score: <a></a></p>
          <canvas id="canvas" width="1000" height="500"></canvas>
        </div>
      </div>
